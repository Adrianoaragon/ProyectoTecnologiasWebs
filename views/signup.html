<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Are You a Little Wet?</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">

    <div class="auth-header">
        <h1>💧 Are You a Little Wet?</h1>
        <p>Crea tu cuenta para acceder al dashboard</p>
    </div>

    <form id="form-signup">
        <div class="campo-grupo">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="campo-grupo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="campo-grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div id="msg-signup" class="mensaje" style="display:none;"></div>

        <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>

    <p class="auth-footer">
        ¿Ya tienes cuenta? <a href="/">Inicia sesión</a>
    </p>

</div>

<script>
    document.getElementById('form-signup').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nombre   = document.getElementById('nombre').value;
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg      = document.getElementById('msg-signup');

        // Validación básica de contraseña
        if (password.length < 6) {
            msg.textContent   = 'La contraseña debe tener al menos 6 caracteres';
            msg.className     = 'mensaje error';
            msg.style.display = 'block';
            return;
        }

        try {
            const res  = await fetch('/api/auth/signup', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ nombre, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                msg.textContent   = 'Cuenta creada correctamente, redirigiendo...';
                msg.className     = 'mensaje exito';
                msg.style.display = 'block';

                // Redirigimos al login después de 2 segundos
                setTimeout(() => window.location.href = '/', 2000);
            } else {
                msg.textContent   = data.error;
                msg.className     = 'mensaje error';
                msg.style.display = 'block';
            }

        } catch (error) {
            msg.textContent   = 'Error de conexión, intenta de nuevo';
            msg.className     = 'mensaje error';
            msg.style.display = 'block';
        }
    });
</script>

</body>
</html>
